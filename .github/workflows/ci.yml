name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: git diff --check

      - name: Svelte and TypeScript Check
        run: npm run check

      - name: Run Unit and Integration Tests
        run: npm run test:unit -- --run

      - name: Install Playwright Browsers & Dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        run: npm run test:e2e

      - name: Compile Production Build
        run: npm run build

      - name: Start production preview for Lighthouse
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/koaladata-preview.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/api/health && exit 0
            sleep 1
          done
          cat /tmp/koaladata-preview.log
          exit 1

      - name: Enforce Lighthouse quality budget
        run: |
          mkdir -p test-results
          npx --yes lighthouse@13.4.0 http://127.0.0.1:4173/ --quiet --chrome-flags="--headless --no-sandbox" --output=json --output-path=test-results/lighthouse.json
          node scripts/check-lighthouse.mjs test-results/lighthouse.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compile Docker Image (Verify build validity)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
