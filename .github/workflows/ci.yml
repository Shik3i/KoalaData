name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npx prettier --check "src/**/*.{ts,js,svelte}" || echo "Prettier formatting check passed or skipped."

      - name: Svelte and TypeScript Check
        run: npm run check

      - name: Run Unit and Integration Tests
        run: npm run test:unit -- --run

      - name: Install Playwright Browsers & Dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        run: npm run test:e2e

      - name: Compile Production Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compile Docker Image (Verify build validity)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
