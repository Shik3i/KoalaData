services:
  app:
    image: ghcr.io/shik3i/koaladata:latest
    container_name: koaladata_app
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATA_DIRECTORY=/data
      - DATABASE_PATH=/data/data.db
      - BACKUP_DIRECTORY=/backups
      - PORT=3000
      - ORIGIN=https://data.koalastuff.net
      - KOALADATA_ADMIN_USERNAME=admin
      - KOALADATA_ADMIN_PASSWORD=change_this_insecure_password_on_first_login
    volumes:
      - koaladata_data:/data
      - koaladata_backups:/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  koaladata_data:
  koaladata_backups:

networks:
  default:
    external: true
    name: caddy_net
