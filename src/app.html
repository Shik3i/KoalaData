<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#101712" />
		<meta name="application-name" content="KoalaData" />
		<meta name="apple-mobile-web-app-title" content="KoalaData" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
		<link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="alternate" type="text/plain" href="/llms.txt" title="KoalaData for language models" />
		<script nonce="%sveltekit.nonce%">
			try {
				const theme = localStorage.getItem('theme') || 'auto';
				if (theme === 'dark' || (theme === 'auto' || theme === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches) {
					document.documentElement.classList.add('dark');
				} else {
					document.documentElement.classList.remove('dark');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
