<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="KoalaData is a self-hosted platform for open browser extension metrics, public discovery, and growth leaderboards." />
		<meta name="text-scale" content="scale" />
		<link rel="icon" href="/brand/koaladata-icon-32.avif" type="image/avif" sizes="32x32" />
		<link rel="icon" href="/brand/koaladata-icon-32.webp" type="image/webp" sizes="32x32" />
		<link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="32x32" />
		<link rel="apple-touch-icon" href="/brand/koaladata-icon-180.png" sizes="180x180" />
		<script nonce="%sveltekit.nonce%">
			try {
				const theme = localStorage.getItem('theme') || 'auto';
				if (theme === 'dark' || (theme === 'auto' || theme === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches) {
					document.documentElement.classList.add('dark');
				} else {
					document.documentElement.classList.remove('dark');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
